<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Research Agent — RAG over arXiv papers</title>
<style>
  :root { --gold:#c9a24b; --bg:#0e0e10; --panel:#17171b; --text:#e8e8ea; --muted:#9a9aa2; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
         background:var(--bg); color:var(--text); line-height:1.6; }
  .wrap { max-width:760px; margin:0 auto; padding:48px 20px; }
  h1 { font-size:1.7rem; margin:0 0 6px; }
  .sub { color:var(--muted); margin:0 0 28px; font-size:.95rem; }
  .box { background:var(--panel); border:1px solid #26262c; border-radius:14px; padding:20px; }
  textarea { width:100%; background:#0b0b0d; color:var(--text); border:1px solid #2c2c34;
             border-radius:10px; padding:14px; font-size:1rem; resize:vertical; min-height:70px; }
  button { margin-top:12px; background:var(--gold); color:#1a1a1a; border:none; font-weight:600;
           padding:12px 22px; border-radius:10px; font-size:1rem; cursor:pointer; }
  button:disabled { opacity:.5; cursor:not-allowed; }
  #answer { margin-top:26px; white-space:pre-wrap; }
  .sources { margin-top:20px; }
  .src { background:var(--panel); border:1px solid #26262c; border-radius:10px;
         padding:10px 14px; margin-bottom:8px; font-size:.9rem; color:var(--muted); }
  .status { color:var(--muted); font-size:.9rem; margin-top:16px; }
  .err { color:#e0645a; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Research Agent</h1>
  <p class="sub">Ask a question about retrieval-augmented generation. Answers are grounded in a corpus of arXiv papers, with sources.</p>

  <div class="box">
    <textarea id="q" placeholder="e.g. How does chunking affect retrieval quality?"></textarea>
    <button id="ask">Ask</button>
    <div class="status" id="status"></div>
  </div>

  <div id="answer"></div>
  <div class="sources" id="sources"></div>
</div>

<script>
  const btn = document.getElementById('ask');
  const q = document.getElementById('q');
  const statusEl = document.getElementById('status');
  const answerEl = document.getElementById('answer');
  const sourcesEl = document.getElementById('sources');

  async function ask() {
    const question = q.value.trim();
    if (question.length < 3) { statusEl.textContent = 'Please enter a longer question.'; return; }

    btn.disabled = true;
    answerEl.textContent = '';
    sourcesEl.innerHTML = '';
    statusEl.textContent = 'Thinking… (this can take several seconds)';

    try {
      const res = await fetch('/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question })
      });

      if (res.status === 429) { statusEl.innerHTML = '<span class="err">Rate limit reached. Please wait a moment.</span>'; return; }
      if (res.status === 503) { statusEl.innerHTML = '<span class="err">The model is busy. Try again shortly.</span>'; return; }
      if (!res.ok) { statusEl.innerHTML = '<span class="err">Something went wrong ('+res.status+').</span>'; return; }

      const data = await res.json();
      statusEl.textContent = '';
      answerEl.textContent = data.answer;

      if (data.sources && data.sources.length) {
        sourcesEl.innerHTML = '<strong>Sources</strong>';
        data.sources.forEach(s => {
          const d = document.createElement('div');
          d.className = 'src';
          d.textContent = s.title + '  (distance ' + s.distance.toFixed(3) + ')';
          sourcesEl.appendChild(d);
        });
      }
    } catch (e) {
      statusEl.innerHTML = '<span class="err">Network error: ' + e.message + '</span>';
    } finally {
      btn.disabled = false;
    }
  }

  btn.addEventListener('click', ask);
  q.addEventListener('keydown', e => { if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) ask(); });
</script>
</body>
</html>
